{% extends 'base.html' %}

{% block title %}{{ title }} — Студия маникюра{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">{{ title }}</h1>
        <div class="alert alert-warning">
            Вы уверены, что хотите удалить «{{ object }}»? Это действие необратимо.
        </div>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url back_url %}" class="btn btn-link">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
