{% extends 'base.html' %}

{% block title %}Вход — Студия маникюра{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="mb-4 text-center">Вход</h1>
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}
                                <div class="text-danger small">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-dark w-100">Войти</button>
                </form>
                <p class="mt-3 text-center text-muted">
                    Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
